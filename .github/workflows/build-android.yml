name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # מאפשר להריץ את הקימפול גם ידנית בלחיצת כפתור

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. מוריד את הקוד שלך לשרת של גיטהאב
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. מתקין Node.js (בשביל שנוכל להריץ npm install)
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 3. מתקין Java (חובה כדי לקמפל אנדרואיד)
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # 4. מתקין את כל הספריות של הפרויקט שלך
    - name: Install dependencies
      run: npm install

    # 5. בונה את אפליקציית ה-Web (הריאקט/Vite שלך)
    - name: Build Web App
      run: npm run build

    # 6. מעביר את קבצי האתר לתוך תיקיית האנדרואיד (Capacitor)
    - name: Sync Capacitor
      run: npx cap sync android

    # 7. מפענח את קובץ החתימה הסודי שלך (Keystore) מתוך גיטהאב
    - name: Decode Keystore
      env:
        ENCODED_STRING: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo $ENCODED_STRING | base64 -d > android/my-release-key.keystore

    # 8. מקמפל את אפליקציית האנדרואיד (Release) וחותם עליה עם הסודות שלך
    - name: Build and Sign Release APK
      working-directory: ./android
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.storeFile=my-release-key.keystore \
          -Pandroid.injected.signing.storePassword=${{ secrets.KEYSTORE_PASSWORD }} \
          -Pandroid.injected.signing.keyAlias=${{ secrets.KEY_ALIAS }} \
          -Pandroid.injected.signing.keyPassword=${{ secrets.KEY_PASSWORD }}

    # 9. מעלה את קובץ ה-APK המוכן והחתום כדי שתוכל להוריד אותו
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: streamify-app-release.apk
        path: android/app/build/outputs/apk/release/app-release.apk