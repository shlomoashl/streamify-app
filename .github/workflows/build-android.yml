name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install dependencies
      run: npm install

    - name: Build Web App
      run: npm run build
      env:        
        VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
        VITE_APP_ENTRY_CODE: ${{ secrets.VITE_APP_ENTRY_CODE }}

    - name: Sync Capacitor
      run: npx cap sync android

    # עדכון ה-versionCode - קריטי למניעת שגיאות עדכון בטלפון
    - name: Bump Version Code
      run: |
        sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" android/app/build.gradle
        echo "Build Number: ${{ github.run_number }}"

    # שלב התיקון: שומרים את המפתח ישירות בתיקיית ה-app
    - name: Decode Keystore
      env:
        ENCODED_STRING: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo $ENCODED_STRING | base64 -d > android/app/my-release-key.keystore

    - name: Build and Sign Release APK
      working-directory: ./android
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.storeFile=my-release-key.keystore \
          -Pandroid.injected.signing.storePassword=${{ secrets.KEYSTORE_PASSWORD }} \
          -Pandroid.injected.signing.keyAlias=${{ secrets.KEY_ALIAS }} \
          -Pandroid.injected.signing.keyPassword=${{ secrets.KEY_PASSWORD }}

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: streamify-app-${{ github.run_number }}
        path: android/app/build/outputs/apk/release/app-release.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: build-${{ github.run_number }}
        name: Streamify Update #${{ github.run_number }}
        files: android/app/build/outputs/apk/release/app-release.apk