name: Build Windows App

on:
  push:
    branches: [ main, master ] # עכשיו הבוט ירוץ *רק* כשאתה עושה push רגיל
  workflow_dispatch: # מאפשר לך להריץ גם ידנית מהאתר

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write # הרשאה הכרחית כדי שהבוט יוכל לכתוב לעמוד ה-Releases

    steps:
    # 1. מוריד את הקוד לשרת הווינדוס
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. מתקין Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 3. מתקין את שפת Rust
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    # 4. מתקין את כל הספריות של הפרויקט
    - name: Install dependencies
      run: npm install

    # 5. מקמפל את אפליקציית הווינדוס!
    - name: Build Tauri Windows App
      run: npm run build:windows
      env:
        VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
        VITE_APP_ENTRY_CODE: ${{ secrets.VITE_APP_ENTRY_CODE }}

    # 6. מעלה את קובץ ההתקנה כ-Artifact (לגיבוי רגיל)
    - name: Upload Windows App
      uses: actions/upload-artifact@v4
      with:
        name: streamify-windows
        path: src-tauri/target/release/bundle/

    # 7. יוצר Release חדש בכל פעם שעושים Push!
    - name: Create GitHub Release and Upload Windows App
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest-build # בדיוק אותו שם!
        name: Streamify (Latest Auto-Build)
        files: |
          src-tauri/target/release/bundle/msi/*.msi
          src-tauri/target/release/bundle/nsis/*.exe