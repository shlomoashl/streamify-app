name: Build Windows App

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*' # הבוט ירוץ גם כשאתה דוחף תגית של גרסה
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write # הרשאה הכרחית כדי שהבוט יוכל לכתוב לעמוד ה-Releases

    steps:
    # 1. מוריד את הקוד לשרת הווינדוס
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. מתקין Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 3. מתקין את שפת Rust
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    # 4. מתקין את כל הספריות של הפרויקט
    - name: Install dependencies
      run: npm install

    # 5. מקמפל את אפליקציית הווינדוס!
    - name: Build Tauri Windows App
      run: npm run build:windows

    # 6. מעלה את קובץ ההתקנה כ-Artifact (לגיבוי רגיל)
    - name: Upload Windows App
      uses: actions/upload-artifact@v4
      with:
        name: streamify-windows
        path: src-tauri/target/release/bundle/

    # 7. התוספת שלנו: שחרור לעמוד ה-Releases
    - name: Create GitHub Release and Upload Windows App
      if: startsWith(github.ref, 'refs/tags/v') # ירוץ *רק* אם זו תגית של גרסה
      uses: softprops/action-gh-release@v1
      with:
        # Tauri מייצר קבצי התקנה בתיקיות משנה, אנחנו תופסים את ה-msi או ה-exe
        files: |
          src-tauri/target/release/bundle/msi/*.msi
          src-tauri/target/release/bundle/nsis/*.exe
        generate_release_notes: true